openapi: 3.0.0
paths:
  /api:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        "200":
          description: ""
      tags:
        - App
  /api/auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "201":
          description: ""
      summary: Request OTP for login (all roles)
      tags: &a1
        - Auth
  /api/auth/verify-otp:
    post:
      operationId: AuthController_verifyOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpDto"
      responses:
        "201":
          description: ""
      summary: Verify OTP and login (all roles)
      tags: *a1
  /api/auth/me:
    get:
      operationId: AuthController_getProfile
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Get current user profile
      tags: *a1
  /api/hospital-chains:
    post:
      operationId: HospitalChainsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHospitalChainDto"
      responses:
        "201":
          description: ""
      security: &a2
        - access-token: []
      summary: Create a new hospital chain (SUPER_ADMIN only)
      tags: &a3
        - Hospital Chains
    get:
      operationId: HospitalChainsController_findAll
      parameters: []
      responses:
        "200":
          description: ""
      security: *a2
      summary: List all hospital chains (SUPER_ADMIN only)
      tags: *a3
  /api/hospital-chains/{id}:
    get:
      operationId: HospitalChainsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a2
      summary: Get a specific hospital chain (SUPER_ADMIN only)
      tags: *a3
    patch:
      operationId: HospitalChainsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHospitalChainDto"
      responses:
        "200":
          description: ""
      security: *a2
      summary: Update a hospital chain (SUPER_ADMIN only)
      tags: *a3
    delete:
      operationId: HospitalChainsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a2
      summary: Delete a hospital chain (SUPER_ADMIN only)
      tags: *a3
  /api/chain/{chainId}/branches:
    post:
      operationId: BranchesController_create
      parameters:
        - name: chainId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchDto"
      responses:
        "201":
          description: ""
      security: &a4
        - access-token: []
      summary: Create a new branch in a chain
      tags: &a5
        - Branches
    get:
      operationId: BranchesController_findAll
      parameters:
        - name: chainId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a4
      summary: List all branches for a chain
      tags: *a5
  /api/chain/{chainId}/branches/{branchId}:
    get:
      operationId: BranchesController_findOne
      parameters:
        - name: chainId
          required: true
          in: path
          schema:
            type: string
        - name: branchId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a4
      summary: Get a branch by ID
      tags: *a5
    patch:
      operationId: BranchesController_update
      parameters:
        - name: chainId
          required: true
          in: path
          schema:
            type: string
        - name: branchId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBranchDto"
      responses:
        "200":
          description: ""
      security: *a4
      summary: Update a branch
      tags: *a5
    delete:
      operationId: BranchesController_remove
      parameters:
        - name: chainId
          required: true
          in: path
          schema:
            type: string
        - name: branchId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a4
      summary: Delete a branch
      tags: *a5
  /api/chain/{chainId}/branches/{branchId}/generate-qr:
    post:
      operationId: BranchesController_generateQr
      parameters:
        - name: chainId
          required: true
          in: path
          schema:
            type: string
        - name: branchId
          required: true
          in: path
          schema:
            type: string
      responses:
        "201":
          description: ""
      security: *a4
      summary: Generate or regenerate QR code for a branch
      tags: *a5
  /api/users/staff/by-branch/{branchId}:
    get:
      operationId: UsersController_findStaffByBranch
      parameters:
        - name: branchId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      summary: Get all staff members for a specific branch
      tags: &a6
        - Users
  /api/users/departments/by-branch/{branchId}:
    get:
      operationId: UsersController_getDepartmentsByBranch
      parameters:
        - name: branchId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      summary: Get all unique departments for a specific branch
      tags: *a6
  /api/users/staff/by-department/{branchId}/{department}:
    get:
      operationId: UsersController_findStaffByDepartment
      parameters:
        - name: branchId
          required: true
          in: path
          schema:
            type: string
        - name: department
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      summary: Get staff members for a specific department in a branch
      tags: *a6
  /api/users/staff/search:
    get:
      operationId: UsersController_searchStaff
      parameters:
        - name: branchId
          required: true
          in: query
          schema:
            type: string
        - name: query
          required: true
          in: query
          schema:
            type: string
        - name: department
          required: true
          in: query
          schema:
            type: string
      responses:
        "200":
          description: ""
      summary: Search staff members by name in a specific branch
      tags: *a6
  /api/users:
    post:
      description: "- SUPER_ADMIN can create any user.\\n- CHAIN_ADMIN can create
        BRANCH_ADMIN, STAFF, and SECURITY in their chain.\\n- BRANCH_ADMIN can
        create STAFF and SECURITY in their branch."
      operationId: UsersController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserDto"
      responses:
        "201":
          description: ""
      security:
        - access-token: []
      summary: Create a new user (any role based on permissions)
      tags: *a6
    get:
      operationId: UsersController_findAll
      parameters:
        - name: role
          required: false
          in: query
          description: Filter users by a specific role (e.g., CHAIN_ADMIN).
          schema:
            type: string
            enum:
              - SUPER_ADMIN
              - CHAIN_ADMIN
              - BRANCH_ADMIN
              - SECURITY_SUPERVISOR
              - SECURITY
              - STAFF
        - name: isActive
          required: false
          in: query
          description: Filter users by their active status (true or false).
          schema:
            default: true
            type: boolean
        - name: branchId
          required: false
          in: query
          description: Filter users by a specific branch ID.
          schema:
            type: string
        - name: chainId
          required: false
          in: query
          description: Filter users by a specific hospital chain ID.
          schema:
            type: string
        - name: department
          required: false
          in: query
          description: Filter STAFF users by a specific department.
          schema:
            type: string
            enum:
              - GENERAL_MEDICINE
              - CARDIOLOGY
              - NEUROLOGY
              - PULMONOLOGY
              - NEPHROLOGY
              - GASTROENTEROLOGY
              - ENDOCRINOLOGY
              - ONCOLOGY
              - HEMATOLOGY
              - DERMATOLOGY
              - INFECTIOUS_DISEASE
              - RHEUMATOLOGY
              - OPHTHALMOLOGY
              - DENTISTRY
              - PAIN_MANAGEMENT
              - GENERAL_SURGERY
              - ORTHOPEDICS
              - NEUROSURGERY
              - CARDIOTHORACIC_SURGERY
              - ENT_SURGERY
              - PLASTIC_RECONSTRUCTIVE_SURGERY
              - UROLOGY
              - OBSTETRICS_GYNECOLOGY
              - PEDIATRICS
              - NEONATOLOGY
              - EMERGENCY
              - INTENSIVE_CARE_UNIT
              - CRITICAL_CARE_UNIT
              - TRAUMA_CENTER
              - RADIOLOGY
              - PATHOLOGY
              - PHARMACY
              - BLOOD_BANK
              - ANESTHESIOLOGY
              - RESPIRATORY_CARE
              - CENTRAL_SUPPLY
              - NUTRITION_AND_DIETETICS
              - MEDICAL_RECORDS
              - SECURITY
              - ADMINISTRATION
              - HUMAN_RESOURCES
              - FINANCE
              - IT_SUPPORT
              - LEGAL_COMPLIANCE
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: List and filter all users based on permissions
      tags: *a6
  /api/users/{id}:
    get:
      operationId: UsersController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Get a specific user by ID
      tags: *a6
    put:
      operationId: UsersController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserDto"
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Update a user by ID
      tags: *a6
    delete:
      operationId: UsersController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Delete a user by ID
      tags: *a6
  /api/branches/all-branches:
    get:
      operationId: AllBranchesController_findAllBranches
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: List all branches across chains (Super Admin only)
      tags:
        - Branches
  /api/visitors/check-by-phone:
    get:
      operationId: VisitorsController_findVisitorByPhone
      parameters:
        - name: phone
          required: true
          in: query
          description: Visitor's 10-digit phone number
          schema:
            type: string
        - name: branchId
          required: true
          in: query
          description: The ID of the branch being visited
          schema:
            type: number
      responses:
        "200":
          description: ""
      summary: Check if a visitor exists by phone number for a specific branch
      tags: &a7
        - Visitor
  /api/visitors/register:
    post:
      operationId: VisitorsController_registerVisitor
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RegisterVisitorDto"
      responses:
        "201":
          description: ""
      security:
        - access-token: []
      summary: Register a new visitor with optional documents
      tags: *a7
  /api/visitors/request-visit:
    post:
      operationId: VisitorsController_createVisitRequest
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateVisitRequestDto"
      responses:
        "201":
          description: ""
      security:
        - access-token: []
      summary: Create a visit request for a registered visitor (by Security)
      tags: *a7
  /api/visitors/verify-code:
    post:
      operationId: VisitorsController_verifyCode
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyVisitCodeDto"
      responses:
        "201":
          description: ""
      security:
        - access-token: []
      summary: Check-in visitor using visit code (by Security)
      tags: *a7
  /api/visitors/verify-checkin-otp:
    post:
      operationId: VisitorsController_verifyCheckInOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCheckInOtpDto"
      responses:
        "200":
          description: OTP verified successfully
        "400":
          description: Invalid OTP or expired
        "401":
          description: Unauthorized
        "404":
          description: Visit not found
      security:
        - access-token: []
      summary: Verify Check-In OTP for visitor at gate (Security only)
      tags: *a7
  /api/visitors/checkin/{visitId}:
    post:
      operationId: VisitorsController_checkInVisitor
      parameters:
        - name: visitId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Visitor checked in successfully
        "400":
          description: Invalid visit state for check-in
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Visit not in your branch
        "404":
          description: Visit not found
      security:
        - access-token: []
      summary: Check-in visitor using visit ID (after OTP verification)
      tags: *a7
  /api/visitors/search:
    get:
      operationId: VisitorsController_searchVisitors
      parameters:
        - name: phone
          required: true
          in: query
          description: 10-digit phone number to search for
          schema:
            minLength: 10
            maxLength: 10
            example: "9876543210"
            type: string
        - name: branchId
          required: true
          in: query
          description: Branch ID to filter visitors
          schema:
            example: branch-uuid-123
            type: string
      responses:
        "200":
          description: Search completed successfully
        "400":
          description: Invalid request parameters
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
      security:
        - access-token: []
      summary: Search for a visitor by phone number (Security only)
      tags: *a7
  /api/visitors/scan-qr:
    post:
      operationId: VisitorsController_scanQRCode
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyVisitCodeDto"
      responses:
        "201":
          description: ""
      summary: Check-in visitor by scanning QR code (by Security)
      tags: *a7
  /api/visitors/checkout/{visitId}:
    patch:
      operationId: VisitorsController_checkout
      parameters:
        - name: visitId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Check-out visitor (by Security)
      tags: *a7
  /api/visitors/active:
    get:
      operationId: VisitorsController_listActive
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: List active (checked-in) visitors (for Security)
      tags: *a7
  /api/visitors/summary:
    get:
      operationId: VisitorsController_summary
      parameters:
        - name: date
          required: false
          in: query
          description: Filter by a single date (YYYY-MM-DD)
          schema:
            type: string
        - name: startDate
          required: false
          in: query
          description: Start date for a date range (YYYY-MM-DD)
          schema:
            type: string
        - name: endDate
          required: false
          in: query
          description: End date for a date range (YYYY-MM-DD)
          schema:
            type: string
        - name: status
          required: false
          in: query
          description: Filter by visit status
          schema:
            type: string
        - name: personToMeet
          required: false
          in: query
          description: Filter by the staff member the visitor met
          schema:
            type: string
        - name: search
          required: false
          in: query
          description: Search by visitor name or phone number
          schema:
            type: string
        - name: page
          required: false
          in: query
          description: Page number for pagination
          schema:
            type: number
        - name: limit
          required: false
          in: query
          description: Number of items per page
          schema:
            type: number
        - name: skip
          required: false
          in: query
          description: Number of items to skip for pagination
          schema:
            type: number
        - name: take
          required: false
          in: query
          description: Number of items to take for pagination
          schema:
            type: number
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Get visitor summary for the branch
      tags: *a7
  /api/visitors/update/{visitorId}:
    patch:
      operationId: VisitorsController_updateVisitor
      parameters:
        - name: visitorId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RegisterVisitorDto"
      responses:
        "200":
          description: ""
      security:
        - access-token: []
      summary: Update visitor details and documents
      tags: *a7
  /api/visitors/download/{visitorId}/{documentType}:
    get:
      operationId: VisitorsController_downloadDocument
      parameters:
        - name: visitorId
          required: true
          in: path
          schema:
            type: string
        - name: documentType
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: File downloaded successfully
        "403":
          description: Access denied
        "404":
          description: Visitor or document not found
      security:
        - access-token: []
      summary: Download visitor document
      tags: *a7
  /api/public/visitors/check-by-phone:
    get:
      operationId: PublicVisitorsController_findVisitorByPhone
      parameters:
        - name: phone
          required: true
          in: query
          description: Visitor's 10-digit phone number
          schema:
            type: string
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      responses:
        "200":
          description: ""
      summary: Check if a visitor exists by phone number for a specific branch
      tags: &a8
        - Public Visitor
  /api/public/visitors/branch-info:
    get:
      operationId: PublicVisitorsController_getBranchInfo
      parameters:
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      responses:
        "200":
          description: ""
      summary: Get branch information and available staff/departments
      tags: *a8
  /api/public/visitors/register:
    post:
      operationId: PublicVisitorsController_registerLegacyVisitor
      parameters:
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PublicRegisterVisitorDto"
      responses:
        "201":
          description: ""
      summary: Register a new visitor via public form (full registration for meeting
        visitors)
      tags: *a8
  /api/public/visitors/quick-register:
    post:
      operationId: PublicVisitorsController_quickRegisterVisitor
      parameters:
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuickRegisterVisitorDto"
      responses:
        "201":
          description: ""
      summary: "Quick registration for delivery visitors (minimal fields: name + phone)"
      tags: *a8
  /api/public/visitors/complete-profile/{visitorId}:
    patch:
      operationId: PublicVisitorsController_completeProfile
      parameters:
        - name: visitorId
          required: true
          in: path
          schema:
            type: string
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteProfileDto"
      responses:
        "200":
          description: ""
      summary: Complete visitor profile for meeting visits (upgrade from delivery
        profile)
      tags: *a8
  /api/public/visitors/delivery-visit:
    post:
      operationId: PublicVisitorsController_createDeliveryVisit
      parameters:
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryVisitDto"
      responses:
        "201":
          description: ""
      summary: Create a delivery visit (auto-approved and checked in)
      tags: *a8
  /api/public/visitors/meeting-visit:
    post:
      operationId: PublicVisitorsController_createMeetingVisitRequest
      parameters:
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingVisitRequestDto"
      responses:
        "201":
          description: ""
      summary: Create a meeting visit request (requires staff approval)
      tags: *a8
  /api/public/visitors/request-visit:
    post:
      operationId: PublicVisitorsController_createVisitRequest
      parameters:
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PublicCreateVisitRequestDto"
      responses:
        "201":
          description: ""
      summary: Create a visit request via public form (legacy endpoint)
      tags: *a8
  /api/public/visitors/update/{visitorId}:
    patch:
      operationId: PublicVisitorsController_updateVisitor
      parameters:
        - name: visitorId
          required: true
          in: path
          schema:
            type: string
        - name: branchId
          required: true
          in: query
          description: Branch ID from QR code
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PublicRegisterVisitorDto"
      responses:
        "200":
          description: ""
      summary: Update visitor details via public form (from QR code)
      tags: *a8
  /api/public/visitors/send-otp:
    post:
      description: Initiates phone verification by sending a 6-digit OTP via SMS.
        Works for both existing and new visitors.
      operationId: PublicVisitorsController_sendOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpDto"
      responses:
        "201":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponseDto"
        "400":
          description: Bad request - validation failed, OTP locked, or SMS send failed
        "429":
          description: Too many requests - rate limit exceeded
      summary: Send OTP to visitor phone for verification
      tags: *a8
  /api/public/visitors/verify-phone:
    post:
      description: Validates the OTP sent to the visitor phone. Returns visitor data
        and indicates if visitor is existing or new.
      operationId: PublicVisitorsController_verifyPhone
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneDto"
      responses:
        "200":
          description: OTP verified successfully
        "400":
          description: Invalid OTP, expired OTP, or locked OTP
        "404":
          description: Visitor not found
      summary: Verify visitor phone number using OTP
      tags: *a8
  /api/public/visitors:
    post:
      description: Creates or updates visitor record and creates a pending visit
        request. Requires phone verification first.
      operationId: PublicVisitorsController_registerVisitor
      parameters: []
      responses:
        "201":
          description: Visit created successfully
        "400":
          description: Validation failed or phone not verified
        "404":
          description: Visitor or branch not found
        "500":
          description: File upload or database error
      summary: Register visitor and create visit request
      tags: *a8
  /api/public/visits/{visitId}/status:
    get:
      description: Returns current visit status with visitor details and gate pass
        data (if approved).
      operationId: PublicVisitsController_getVisitStatus
      parameters:
        - name: visitId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Visit status retrieved successfully
        "400":
          description: Invalid visit ID format
        "404":
          description: Visit not found
      summary: Get visit status by visit ID (public endpoint)
      tags: &a9
        - Public Visits
  /api/public/visits/{visitId}/gate-pass:
    get:
      description: Returns gate pass URL, OTP, and visitor details for approved
        visits. Auto-regenerates expired URLs.
      operationId: PublicVisitsController_getGatePass
      parameters:
        - name: visitId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Gate pass retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatePassResponse"
        "400":
          description: Invalid visit ID format
        "404":
          description: Gate pass not found
        "500":
          description: URL regeneration failed
      summary: Get gate pass by visit ID (public endpoint)
      tags: *a9
