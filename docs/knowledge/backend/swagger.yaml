        email:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        pinCode:
          type: string
        country:
          type: string
      required:
        - name
        - phone
        - email
        - street
        - city
        - state
        - pinCode
        - country
    UpdateHospitalChainDto:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        pinCode:
